name: Tests — Integration (Testcontainers)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-integration:
    name: Integration Tests (real PostgreSQL + Kafka via Testcontainers)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven

      - name: Run integration tests
        run: mvn test -P integration --no-transfer-progress