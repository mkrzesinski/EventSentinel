name: Build & Health Check

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      - name: Build all service JARs
        run: mvn -q package -DskipTests

      - name: Start user-service
        run: |
          java -jar user-service/target/user-service-0.0.1-SNAPSHOT.jar --server.port=18081 &
          echo $! > /tmp/user-service.pid

      - name: Start order-service
        run: |
          java -jar order-service/target/order-service-0.0.1-SNAPSHOT.jar --server.port=18082 &
          echo $! > /tmp/order-service.pid

      - name: Start inventory-service
        run: |
          java -jar inventory-service/target/inventory-service-0.0.1-SNAPSHOT.jar --server.port=18083 &
          echo $! > /tmp/inventory-service.pid

      - name: Wait for services to be ready
        run: |
          check_health() {
            local name=$1
            local port=$2
            local max_attempts=30
            local attempt=0

            echo "Waiting for $name on port $port..."
            while [ $attempt -lt $max_attempts ]; do
              if curl -sf http://127.0.0.1:$port/health > /dev/null 2>&1; then
                echo "$name is ready."
                return 0
              fi
              attempt=$((attempt + 1))
              sleep 2
            done
            echo "ERROR: $name did not become ready within $((max_attempts * 2))s"
            return 1
          }

          check_health "user-service"      18081
          check_health "order-service"      18082
          check_health "inventory-service"  18083

      - name: Health check — user-service
        run: |
          response=$(curl -sf http://127.0.0.1:18081/health)
          echo "user-service: $response"
          echo "$response" | grep -q '"status":"UP"'

      - name: Health check — order-service
        run: |
          response=$(curl -sf http://127.0.0.1:18082/health)
          echo "order-service: $response"
          echo "$response" | grep -q '"status":"UP"'

      - name: Health check — inventory-service
        run: |
          response=$(curl -sf http://127.0.0.1:18083/health)
          echo "inventory-service: $response"
          echo "$response" | grep -q '"status":"UP"'

      - name: Stop services
        if: always()
        run: |
          for pidfile in /tmp/user-service.pid /tmp/order-service.pid /tmp/inventory-service.pid; do
            if [ -f "$pidfile" ]; then
              kill "$(cat "$pidfile")" 2>/dev/null || true
            fi
          done

